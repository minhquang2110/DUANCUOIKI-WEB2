<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8" />
    <title th:replace="this :: pageTitle">Trang chính</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
    <!-- HEADER -->
    <div th:fragment="header">
        <header class="d-flex justify-content-end align-items-center p-2 border-bottom">
            <a th:href="@{/profile}">Profile</a>
            <a th:href="@{/logout}">Logout</a>
        </header>
    </div>

    <!-- NAV MENU -->
    <div th:fragment="menu">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand" th:href="@{/}">Khoa CNTT</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                    aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/scientists}">Scientists</a>
                        </li>
                        <li class="nav-item" >
                            <a class="nav-link" th:href="@{/admin/scientists}">List Scientist (CRUD)</a>
                        </li>
                        <li class="nav-item" >
                            <a class="nav-link" th:href="@{/admin/accounts/create}">Create Account</a>
                        </li>
                        <li class="nav-item" >
                            <a class="nav-link" th:href="@{/admin/statistic}">Statistic</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

		<!-- SEARCH -->
	<section th:fragment="search" class="intro pb-4">
	  <div class="bg-image" style="background-image: url('https://mdbootstrap.com/img/Photos/new-templates/search-box/img6.jpg');">
	    <div class="mask d-flex align-items-center" style="background-color: rgba(0,0,0,.43); padding: 1rem 0;">
	      <div class="container">
	        <div class="row justify-content-center">
	          <div class="col-md-10 col-lg-8 col-xl-7">
	            <div class="card mb-3">
	              <div class="card-body p-2">
	                <form th:action="@{/scientists}" method="get" class="d-flex gap-2">
	                  <input name="keyword" type="text" class="form-control form-control-lg rounded" placeholder="Tìm kiếm tên nhà khoa học" />
	                  <button class="btn btn-warning btn-lg" type="submit">Tìm kiếm</button>
	                </form>
	              </div>
	            </div>
	            <div class="card bg-black mb-3">
	              <div class="card-body p-3 text-white">
	                <h6 class="mb-3">Tìm kiếm nâng cao</h6>
	                <form th:action="@{/scientists}" method="get">
	                  <div class="row g-2">
	                    <div class="col-md-6 col-lg-4">
	                      <select name="organizationId" class="form-select form-select-sm" aria-label="Đơn vị">
	                        <option value="" selected>Đơn vị</option>
	                        <option value="1">Đơn vị 1</option>
	                        <option value="2">Đơn vị 2</option>
	                        <option value="3">Đơn vị 3</option>
	                      </select>
	                    </div>
	                    <div class="col-md-6 col-lg-4">
	                      <select name="rankId" class="form-select form-select-sm" aria-label="Ngạch">
	                        <option value="" selected>Ngạch</option>
	                        <option value="1">Ngạch 1</option>
	                        <option value="2">Ngạch 2</option>
	                        <option value="3">Ngạch 3</option>
	                      </select>
	                    </div>
	                    <div class="col-md-6 col-lg-4">
	                      <select name="titleId" class="form-select form-select-sm" aria-label="Chức danh">
	                        <option value="" selected>Chức danh</option>
	                        <option value="1">Chức danh 1</option>
	                        <option value="2">Chức danh 2</option>
	                        <option value="3">Chức danh 3</option>
	                      </select>
	                    </div>
	                    <div class="col-md-6 col-lg-4">
	                      <select name="degreeId" class="form-select form-select-sm" aria-label="Học vị">
	                        <option value="" selected>Học vị</option>
	                        <option value="1">Học vị 1</option>
	                        <option value="2">Học vị 2</option>
	                        <option value="3">Học vị 3</option>
	                      </select>
	                    </div>
	                    <div class="col-md-6 col-lg-5">
	                      <select name="researchFieldId" class="form-select form-select-sm" aria-label="Lĩnh vực nghiên cứu">
	                        <option value="" selected>Lĩnh vực nghiên cứu</option>
	                        <option value="1">Lĩnh vực 1</option>
	                        <option value="2">Lĩnh vực 2</option>
	                        <option value="3">Lĩnh vực 3</option>
	                      </select>
	                    </div>
	                    <div class="col-md-6 col-lg-3 d-flex align-items-center">
	                      <button type="submit" class="btn btn-warning w-100">Tìm kiếm</button>
	                    </div>
	                  </div>
	                </form>
	              </div>
	            </div>
	          </div>
	        </div>
	      </div>
	    </div>
	  </div>
	</section>



    <!-- FOOTER -->
    <div th:fragment="footer">
        <footer class="bg-light text-dark mt-5 p-4">
            <div class="container d-flex justify-content-between align-items-center">
                <div style="max-width: 600px;">
                    <h5>KHOA CÔNG NGHỆ THÔNG TIN</h5>
                    <p>Trưởng khoa: TS. Phạm Thị Thu Thúy</p>
                    <p>Tầng 7, Nhà Đa Năng. 02 Tôn Thất Tùng</p>
                    <p>02582471367</p>
                    <p>kcntt@ntu.edu.vn</p>
                    <p><a href="http://khoacntt.ntu.edu.vn" target="_blank">khoacntt.ntu.edu.vn</a></p>
                </div>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
